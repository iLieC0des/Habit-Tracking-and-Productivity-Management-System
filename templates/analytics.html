{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-semibold mb-4">Analytics</h1>
    
<p class="text-slate-500 mb-4 text-sm">
  Past 7 days of total check-ins across all habits.
</p>

<div class="card p-4 shadow-sm">
  <canvas id="chart" height="140"></canvas>
  <div id="summary" class="text-sm text-slate-500 mt-3"></div>
</div>

<h2 class="text-xl font-semibold mt-8 mb-3">Your Habits</h2>

<div class="grid gap-3">

  {% for habit in habits %}
      
  <div class="card p-4 flex items-center justify-between shadow-sm hover:shadow-md transition">
    
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 rounded-full" style="background: {{ habit.color }}"></div>
      <div class="font-medium">{{ habit.name }}</div>
    </div>

    <!-- DELETE BUTTON -->
    <form action="/habits/{{ habit.id }}/delete" method="POST" onsubmit="return confirm('Delete this habit?')">
      <button class="text-red-500 text-sm hover:underline">
        Delete
      </button>
    </form>

  </div>

  {% endfor %}

</div>

<script>
fetch("/analytics.json")
  .then((r) => r.json())
  .then(({ labels, data }) => {

    const total = data.reduce((a, b) => a + b, 0);

    document.getElementById('summary').textContent =
      'Total check-ins this week: ' + total;

    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: 'Check-ins', data }]
      },
      options: {
        scales: {
          y: { beginAtZero: true, precision: 0 }
        }
      }
    });
  });
</script>

{% endblock %}
