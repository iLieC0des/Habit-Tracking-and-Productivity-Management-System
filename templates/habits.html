<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habit Tracker – Habits</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .card{
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800">
  <main class="max-w-4xl mx-auto px-4 py-6">

{% extends 'base.html' %} {% block content %}
    
    <h1 class="text-2xl font-semibold mb-4">Habits</h1>

    <form 
     method="post"
     action="/habits/create" 
     class="card p-4 mb-6 grid md:grid-cols-3 gap-3 shadow-sm">
      
      <input 
        name="name"
        placeholder="Habit name (e.g., Walk 20 min)" 
        class="px-3 py-2 rounded-lg bg-white border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-300"
      />

      <input 
        name="color"
        type="color" 
        value="#60a5fa" 
        class="px-3 py-2 rounded-lg bg-white border border-slate-300 h-10"
      />

      <button class="px-3 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-700 transition">
        Add Habit
      </button>

    </form>

    <div class="grid gap-3">

      {% if habits %}

        {% for habit in habits %}
      
        <div class="card p-4 flex items-center justify-between shadow-sm hover:shadow-md transition">
          
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full" style="background: {{ habit.color }}"></div>
            <div class="font-medium">{{ habit.name }}</div>
            <div class="text-xs text-slate-500">Created {{ habit.created_at.strftime('%b %d, %Y') }}</div>
          </div>


          <form action="/habits/{{habit.id}}/delete" method="post" onsubmit="return confirm('Delete the habit?')">
            <button 
            class="px-3 py-1.5 rounded-lg bg-red-500/90 hover:bg-red-500 text-white text-sm transition">
            Delete
          </button>
          </form>

          </div>

        {% endfor %}

      {% endif %}

    </div>

{% endblock %}

  </main>
</body>
</html>
